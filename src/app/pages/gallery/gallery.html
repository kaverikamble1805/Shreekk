<div class="gallery-section pt-100 md-pt-80 pb-100 md-pb-80">
    <div class="container">
        <div class="row g-4">

            <div class="col-lg-4 col-md-6" *ngFor="let item of paginatedImages">

                <div class="photo-gallery">

                    <div class="photo-gallery-image">

                        <figure class="image-anime">

                            <img [src]="item.image" [alt]="item.alt">

                        </figure>

                    </div>

                    <!-- Popup Icon -->
                    <div class="photo-gallery-icon">

                        <a class="photo-popup" (click)="openImage(item.image)">

                            <i class="fa-solid fa-plus"></i>

                        </a>

                    </div>

                </div>

            </div>

        </div>
        <div class="row">
            <div class="col-12">
                <!-- pagination start -->
                <!-- <div class="pagination justify-content-center mt-0">
                    <nav aria-label="page navigation">
                        <ul class="page-list">
                            <li><a aria-current="page" class="page-numbers current" href="#">1</a></li>
                            <li><a class="page-numbers" href="#">2</a></li>
                            <li><a class="next page-numbers" href="#">Next Page</a></li>
                        </ul>
                    </nav>
                </div> -->

                <div class="pagination justify-content-center mt-0">

                    <nav aria-label="page navigation">

                        <ul class="page-list">

                            <!-- Prev -->
                            <li>

                                <a href="javascript:void(0)" class="next page-numbers" (click)="prevPage()"
                                    [class.disabled]="currentPage === 1">

                                    Prev

                                </a>

                            </li>

                            <!-- Numbers -->
                            <li *ngFor="let page of [].constructor(totalPages); let i = index">

                                <a href="javascript:void(0)" class="page-numbers"
                                    [class.current]="currentPage === i + 1" (click)="changePage(i + 1)">

                                    {{ i + 1 }}

                                </a>

                            </li>

                            <!-- Next -->
                            <li>

                                <a href="javascript:void(0)" class="next page-numbers" (click)="nextPage()"
                                    [class.disabled]="currentPage === totalPages">

                                    Next

                                </a>

                            </li>

                        </ul>

                    </nav>

                </div>
                <!-- pagination end -->
            </div>
        </div>
    </div>
</div>
<!-- gallery section end -->

<!-- Image Popup Modal -->

<div class="custom-image-modal" *ngIf="selectedImage">

    <span class="close-btn" (click)="closeImage()">
        &times;
    </span>

    <button class="nav-btn prev-btn" (click)="prevImage()">
        &#10094;
    </button>

    <img [src]="selectedImage" class="popup-image">

    <button class="nav-btn next-btn" (click)="nextImage()">
        &#10095;
    </button>
    <div class="image-counter">

        {{ currentImageIndex + 1 }}
        /
        {{ galleryImages.length }}

    </div>
</div>
